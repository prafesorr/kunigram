name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        run: |
          cd ios
          xcodebuild -workspace kunigram.xcworkspace -scheme kunigram -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package to .ipa
        run: |
          mkdir -p Payload
          mv ios/build/Build/Products/Release-iphoneos/kunigram.app Payload/
          zip -r kunigram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunigram-ipa
          path: kunigram.ipa