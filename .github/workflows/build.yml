name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Обновил до 20, Expo лучше работает

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}  # Опционально, если нужно

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # Ключевой фикс: устанавливаем переменные окружения для React Native
      - name: Build App (Unsigned)
        env:
          RCT_NO_LAUNCH_PACKAGER: "1"  # Отключаем попытку запуска Metro
          NODE_BINARY: $(which node)
        run: |
          cd ios
          xcodebuild -workspace sqrtgram.xcworkspace \
            -scheme sqrtgram \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package to .ipa
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n1)
          cp -r "$APP_PATH" Payload/
          zip -r sqrtgram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqrtgram-ipa
          path: sqrtgram.ipa
