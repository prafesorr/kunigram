name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # Проверяем, что создалось (для отладки)
      - name: List iOS directory
        run: ls -la ios/

      - name: Build App (Unsigned)
        run: |
          cd ios
          # Используем *.xcworkspace чтобы поймать любое имя
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -n1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found, trying .xcodeproj"
            xcodebuild -project kunigram.xcodeproj \
              -scheme kunigram \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          else
            echo "Using workspace: $WORKSPACE"
            xcodebuild -workspace "$WORKSPACE" \
              -scheme kunigram \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          fi

      - name: Package to .ipa
        run: |
          mkdir -p Payload
          mv ios/build/Build/Products/Release-iphoneos/kunigram.app Payload/
          zip -r kunigram.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kunigram-ipa
          path: kunigram.ipa
